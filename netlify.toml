[build]
  command = "npm run build"
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[redirects]]
  from = "http://gala400.it/*"
  to = "https://gala400.it/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.gala400.it/*"
  to = "https://gala400.it/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.gala400.it/*"
  to = "https://gala400.it/:splat"
  status = 301
  force = true

# Redirect vecchi URL marche → nuova struttura
[[redirects]]
  from = "/marche/assistenza-:brand-verona.html"
  to = "/marche/:brand-verona.html"
  status = 301
