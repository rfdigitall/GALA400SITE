[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[redirects]]
  from = "http://gala400.it/*"
  to = "https://gala400.it/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.gala400.it/*"
  to = "https://gala400.it/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.gala400.it/*"
  to = "https://gala400.it/:splat"
  status = 301
  force = true
